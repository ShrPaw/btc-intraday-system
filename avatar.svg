<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Deep void background -->
    <radialGradient id="bg" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#0a1a0a"/>
      <stop offset="40%" stop-color="#040d04"/>
      <stop offset="100%" stop-color="#010301"/>
    </radialGradient>
    
    <!-- Lich green fire eye -->
    <radialGradient id="greenFire" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#aaff00"/>
      <stop offset="20%" stop-color="#66ff00"/>
      <stop offset="50%" stop-color="#22aa00" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#004400" stop-opacity="0"/>
    </radialGradient>
    
    <!-- Green eye core -->
    <radialGradient id="eyeCore" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#eeffcc"/>
      <stop offset="25%" stop-color="#aaff00"/>
      <stop offset="60%" stop-color="#44cc00"/>
      <stop offset="100%" stop-color="#115500"/>
    </radialGradient>
    
    <!-- Skull face - pale/dead -->
    <radialGradient id="skullFace" cx="50%" cy="45%" r="48%">
      <stop offset="0%" stop-color="#3a3a2a"/>
      <stop offset="40%" stop-color="#252518"/>
      <stop offset="100%" stop-color="#10100a"/>
    </radialGradient>
    
    <!-- Bone highlight -->
    <linearGradient id="boneHL" x1="0.2" y1="0" x2="0.8" y2="1">
      <stop offset="0%" stop-color="#5a5a40" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#15150a" stop-opacity="0"/>
    </linearGradient>
    
    <!-- Filters -->
    <filter id="heavyBlur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="15"/>
    </filter>
    <filter id="blur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
    <filter id="softBlur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4"/>
    </filter>
    <filter id="tinyBlur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.5"/>
    </filter>
    
    <clipPath id="circle">
      <circle cx="256" cy="256" r="256"/>
    </clipPath>
  </defs>
  
  <g clip-path="url(#circle)">
    
    <!-- Background -->
    <rect width="512" height="512" fill="url(#bg)"/>
    
    <!-- Green toxic ambient glow from below -->
    <ellipse cx="256" cy="480" rx="180" ry="140" fill="#0a2200" opacity="0.2" filter="url(#heavyBlur)"/>
    
    <!-- Background wisps of green death energy -->
    <g opacity="0.15">
      <path d="M 80 500 C 90 420, 60 350, 110 280 C 140 240, 90 200, 130 140" 
            stroke="#1a4400" stroke-width="25" fill="none" filter="url(#heavyBlur)"/>
      <path d="M 432 500 C 422 420, 452 350, 402 280 C 372 240, 422 200, 382 140" 
            stroke="#1a4400" stroke-width="25" fill="none" filter="url(#heavyBlur)"/>
    </g>
    
    <!-- === THE LICH SKULL === -->
    
    <!-- Outer death aura -->
    <ellipse cx="256" cy="250" rx="145" ry="185" fill="#051500" opacity="0.5" filter="url(#heavyBlur)"/>
    
    <!-- Skull shape - tall, narrow, menacing like the Lich -->
    <path d="
      M 256 75
      C 185 75, 140 115, 130 170
      C 118 230, 125 285, 140 315
      C 152 340, 175 360, 200 370
      C 220 378, 240 382, 256 384
      C 272 382, 292 378, 312 370
      C 337 360, 360 340, 372 315
      C 387 285, 394 230, 382 170
      C 372 115, 327 75, 256 75 Z
    " fill="url(#skullFace)" stroke="#2a2a18" stroke-width="1.5"/>
    
    <!-- Skull bone structure -->
    <!-- Forehead dome -->
    <ellipse cx="256" cy="125" rx="65" ry="40" fill="url(#boneHL)" opacity="0.5"/>
    <!-- Left temple sunken -->
    <ellipse cx="185" cy="165" rx="32" ry="38" fill="#0a0a05" opacity="0.9"/>
    <!-- Right temple sunken -->
    <ellipse cx="327" cy="165" rx="32" ry="38" fill="#0a0a05" opacity="0.9"/>
    <!-- Cheekbone left -->
    <ellipse cx="175" cy="250" rx="22" ry="35" fill="url(#boneHL)" opacity="0.3"/>
    <!-- Cheekbone right -->
    <ellipse cx="337" cy="250" rx="22" ry="35" fill="url(#boneHL)" opacity="0.3"/>
    
    <!-- === HORNS - Lich style crown of bone === -->
    <!-- Center spike -->
    <path d="M 248 90 L 256 42 L 264 90 Z" fill="#2a2a18" stroke="#3a3a25" stroke-width="0.8"/>
    <!-- Left spike -->
    <path d="M 218 95 L 228 52 L 236 100 Z" fill="#2a2a18" stroke="#3a3a25" stroke-width="0.8"/>
    <!-- Right spike -->
    <path d="M 276 100 L 284 52 L 294 95 Z" fill="#2a2a18" stroke="#3a3a25" stroke-width="0.8"/>
    <!-- Far left horn - curved like the Lich -->
    <path d="M 170 130 C 155 108, 138 88, 118 65 C 115 60, 120 58, 125 62 C 142 80, 158 100, 172 125 Z" 
          fill="#252515" stroke="#3a3a25" stroke-width="0.8"/>
    <!-- Far right horn - curved -->
    <path d="M 342 130 C 357 108, 374 88, 394 65 C 397 60, 392 58, 387 62 C 370 80, 354 100, 340 125 Z" 
          fill="#252515" stroke="#3a3a25" stroke-width="0.8"/>
    
    <!-- === EYE SOCKETS - deep hollow === -->
    <ellipse cx="208" cy="210" rx="40" ry="35" fill="#000000"/>
    <ellipse cx="304" cy="210" rx="40" ry="35" fill="#000000"/>
    
    <!-- === GREEN FIRE EYES - THE LICH SIGNATURE === -->
    
    <!-- Left eye - outer green inferno -->
    <ellipse cx="208" cy="208" rx="55" ry="45" fill="url(#greenFire)" filter="url(#blur)"/>
    <!-- Left eye - mid glow -->
    <ellipse cx="208" cy="208" rx="30" ry="25" fill="url(#greenFire)" filter="url(#softBlur)"/>
    <!-- Left eye - core -->
    <ellipse cx="208" cy="208" rx="16" ry="14" fill="url(#eyeCore)"/>
    <!-- Left eye - slit pupil (vertical like the Lich) -->
    <ellipse cx="208" cy="208" rx="4" ry="14" fill="#001a00"/>
    <!-- Left eye - bright highlight -->
    <ellipse cx="215" cy="200" rx="4" ry="3" fill="#ddffaa" opacity="0.95"/>
    
    <!-- Right eye - outer green inferno -->
    <ellipse cx="304" cy="208" rx="55" ry="45" fill="url(#greenFire)" filter="url(#blur)"/>
    <!-- Right eye - mid glow -->
    <ellipse cx="304" cy="208" rx="30" ry="25" fill="url(#greenFire)" filter="url(#softBlur)"/>
    <!-- Right eye - core -->
    <ellipse cx="304" cy="208" rx="16" ry="14" fill="url(#eyeCore)"/>
    <!-- Right eye - slit pupil -->
    <ellipse cx="304" cy="208" rx="4" ry="14" fill="#001a00"/>
    <!-- Right eye - bright highlight -->
    <ellipse cx="311" cy="200" rx="4" ry="3" fill="#ddffaa" opacity="0.95"/>
    
    <!-- === NOSE - skeletal slit === -->
    <path d="M 250 240 L 246 280 L 256 284 L 266 280 L 262 240" fill="#0a0a05" stroke="#2a2a15" stroke-width="0.8"/>
    <ellipse cx="249" cy="282" rx="5" ry="3.5" fill="#000000"/>
    <ellipse cx="263" cy="282" rx="5" ry="3.5" fill="#000000"/>
    
    <!-- === MOUTH - the Lich's terrifying maw === -->
    <!-- Mouth cavity - wide, gaping -->
    <path d="
      M 185 310
      C 195 298, 220 300, 256 294
      C 292 300, 317 298, 327 310
      C 318 355, 298 370, 256 375
      C 214 370, 194 355, 185 310 Z
    " fill="#000000"/>
    
    <!-- Teeth - jagged, uneven, skull-like -->
    <g fill="#8a8a60" stroke="#5a5a38" stroke-width="0.5">
      <!-- Top teeth -->
      <path d="M 192 308 L 196 308 L 194 326 L 190 322 Z"/>
      <path d="M 202 305 L 207 305 L 206 320 L 201 318 Z"/>
      <path d="M 214 303 L 219 303 L 218 318 L 213 316 Z"/>
      <path d="M 226 301 L 231 301 L 230 315 L 225 314 Z"/>
      <path d="M 238 300 L 243 300 L 242 314 L 237 313 Z"/>
      <path d="M 250 299 L 255 299 L 254 313 L 249 312 Z"/>
      <path d="M 262 299 L 267 299 L 266 313 L 261 312 Z"/>
      <path d="M 274 300 L 279 300 L 278 314 L 273 313 Z"/>
      <path d="M 286 301 L 291 301 L 290 315 L 285 314 Z"/>
      <path d="M 298 303 L 303 303 L 302 318 L 297 316 Z"/>
      <path d="M 310 305 L 315 305 L 314 320 L 309 318 Z"/>
      <path d="M 320 308 L 324 308 L 322 322 L 318 326 Z"/>
      
      <!-- Bottom teeth - fewer, sharper -->
      <path d="M 200 358 L 204 358 L 203 344 L 199 346 Z"/>
      <path d="M 215 360 L 219 360 L 218 346 L 214 348 Z"/>
      <path d="M 230 362 L 234 362 L 233 348 L 229 350 Z"/>
      <path d="M 245 363 L 249 363 L 248 349 L 244 351 Z"/>
      <path d="M 260 363 L 264 363 L 263 349 L 259 351 Z"/>
      <path d="M 275 363 L 279 363 L 278 349 L 274 351 Z"/>
      <path d="M 290 362 L 294 362 L 293 348 L 289 350 Z"/>
      <path d="M 305 360 L 309 360 L 308 346 L 304 348 Z"/>
      <path d="M 318 358 L 322 358 L 321 344 L 317 346 Z"/>
    </g>
    
    <!-- Green energy leaking from mouth -->
    <ellipse cx="256" cy="335" rx="40" ry="15" fill="#22aa00" opacity="0.08" filter="url(#softBlur)"/>
    
    <!-- === ROBE / CLOAK - tattered, flowing === -->
    <path d="
      M 130 290
      C 115 320, 90 370, 70 430
      C 58 468, 50 495, 45 512
      L 467 512
      C 462 495, 454 468, 442 430
      C 422 370, 397 320, 382 290
      C 368 310, 350 335, 337 360
      C 315 375, 290 382, 256 385
      C 222 382, 197 375, 175 360
      C 162 335, 144 310, 130 290 Z
    " fill="#0a0d05" stroke="#151a0a" stroke-width="1"/>
    
    <!-- Robe fabric folds -->
    <path d="M 125 330 C 110 370, 80 430, 55 490" stroke="#0d1008" stroke-width="4" fill="none" opacity="0.6"/>
    <path d="M 387 330 C 402 370, 432 430, 457 490" stroke="#0d1008" stroke-width="4" fill="none" opacity="0.6"/>
    <path d="M 180 370 C 170 400, 150 450, 130 500" stroke="#0d1008" stroke-width="2.5" fill="none" opacity="0.4"/>
    <path d="M 332 370 C 342 400, 362 450, 382 500" stroke="#0d1008" stroke-width="2.5" fill="none" opacity="0.4"/>
    
    <!-- Tattered edges -->
    <path d="M 45 512 L 38 475 C 40 482, 32 495, 28 512 Z" fill="#0a0d05" opacity="0.7"/>
    <path d="M 100 512 L 92 468 C 96 478, 86 492, 80 512 Z" fill="#0a0d05" opacity="0.6"/>
    <path d="M 165 512 L 160 472 C 163 482, 155 498, 148 512 Z" fill="#0a0d05" opacity="0.5"/>
    <path d="M 256 512 L 254 478 C 256 488, 250 502, 246 512 Z" fill="#0a0d05" opacity="0.4"/>
    <path d="M 347 512 L 352 472 C 349 482, 357 498, 364 512 Z" fill="#0a0d05" opacity="0.5"/>
    <path d="M 420 512 L 425 468 C 420 478, 430 492, 435 512 Z" fill="#0a0d05" opacity="0.6"/>
    <path d="M 467 512 L 474 475 C 472 482, 480 495, 484 512 Z" fill="#0a0d05" opacity="0.7"/>
    
    <!-- === SKELETAL HANDS / CLAWS === -->
    <!-- Left hand -->
    <g transform="translate(100, 370) rotate(-20)">
      <!-- Palm -->
      <ellipse cx="10" cy="-5" rx="15" ry="20" fill="#252518"/>
      <!-- Fingers -->
      <path d="M -2 -15 C -4 -35, -6 -55, -4 -72 L 1 -70 C 0 -55, -1 -35, 1 -15 Z" fill="#252518" stroke="#3a3a20" stroke-width="0.5"/>
      <path d="M 8 -18 C 7 -40, 5 -62, 7 -80 L 12 -78 C 11 -62, 12 -40, 13 -18 Z" fill="#252518" stroke="#3a3a20" stroke-width="0.5"/>
      <path d="M 18 -16 C 18 -36, 18 -56, 20 -72 L 24 -70 C 23 -56, 22 -36, 22 -16 Z" fill="#252518" stroke="#3a3a20" stroke-width="0.5"/>
      <path d="M 27 -12 C 29 -28, 31 -44, 33 -56 L 37 -54 C 35 -42, 33 -28, 31 -12 Z" fill="#252518" stroke="#3a3a20" stroke-width="0.5"/>
      <!-- Claws -->
      <path d="M -4 -72 L -8 -90 L 0 -74 Z" fill="#1a2a10"/>
      <path d="M 7 -80 L 3 -98 L 12 -82 Z" fill="#1a2a10"/>
      <path d="M 20 -72 L 18 -88 L 24 -74 Z" fill="#1a2a10"/>
      <path d="M 33 -56 L 32 -70 L 37 -58 Z" fill="#1a2a10"/>
    </g>
    
    <!-- Right hand -->
    <g transform="translate(400, 370) rotate(20)">
      <ellipse cx="10" cy="-5" rx="15" ry="20" fill="#252518"/>
      <path d="M -2 -15 C -4 -35, -6 -55, -4 -72 L 1 -70 C 0 -55, -1 -35, 1 -15 Z" fill="#252518" stroke="#3a3a20" stroke-width="0.5"/>
      <path d="M 8 -18 C 7 -40, 5 -62, 7 -80 L 12 -78 C 11 -62, 12 -40, 13 -18 Z" fill="#252518" stroke="#3a3a20" stroke-width="0.5"/>
      <path d="M 18 -16 C 18 -36, 18 -56, 20 -72 L 24 -70 C 23 -56, 22 -36, 22 -16 Z" fill="#252518" stroke="#3a3a20" stroke-width="0.5"/>
      <path d="M 27 -12 C 29 -28, 31 -44, 33 -56 L 37 -54 C 35 -42, 33 -28, 31 -12 Z" fill="#252518" stroke="#3a3a20" stroke-width="0.5"/>
      <path d="M -4 -72 L -8 -90 L 0 -74 Z" fill="#1a2a10"/>
      <path d="M 7 -80 L 3 -98 L 12 -82 Z" fill="#1a2a10"/>
      <path d="M 20 -72 L 18 -88 L 24 -74 Z" fill="#1a2a10"/>
      <path d="M 33 -56 L 32 -70 L 37 -58 Z" fill="#1a2a10"/>
    </g>
    
    <!-- Green eye glow illuminating the environment -->
    <ellipse cx="256" cy="290" rx="130" ry="90" fill="#1a4400" opacity="0.12" filter="url(#heavyBlur)"/>
    
    <!-- Light on robe from eyes -->
    <path d="M 185 310 C 195 290, 220 300, 225 335" stroke="#228800" stroke-width="10" fill="none" opacity="0.05" filter="url(#blur)"/>
    <path d="M 327 310 C 317 290, 292 300, 287 335" stroke="#228800" stroke-width="10" fill="none" opacity="0.05" filter="url(#blur)"/>
    
    <!-- Floating green death particles -->
    <circle cx="110" cy="140" r="2" fill="#66ff00" opacity="0.5"/>
    <circle cx="405" cy="170" r="1.5" fill="#44cc00" opacity="0.4"/>
    <circle cx="85" cy="290" r="2" fill="#66ff00" opacity="0.3"/>
    <circle cx="440" cy="270" r="1.5" fill="#44cc00" opacity="0.4"/>
    <circle cx="140" cy="90" r="1.5" fill="#88ff00" opacity="0.3"/>
    <circle cx="380" cy="110" r="2" fill="#66ff00" opacity="0.35"/>
    <circle cx="160" cy="400" r="1.5" fill="#44cc00" opacity="0.25"/>
    <circle cx="360" cy="410" r="1" fill="#66ff00" opacity="0.3"/>
    
    <!-- Vignette -->
    <radialGradient id="vignette" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="transparent"/>
      <stop offset="70%" stop-color="transparent"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.5"/>
    </radialGradient>
    <rect width="512" height="512" fill="url(#vignette)"/>
    
  </g>
</svg>
